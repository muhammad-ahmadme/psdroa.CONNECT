<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Feed | PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --twitter-blue: #1d9bf0;
            --border-gray: #2f3336;
            --text-dim: #71767b;
            --bg-black: #000;
            --bg-hover: rgba(255, 255, 255, 0.05);
        }

        body { background-color: var(--bg-black); color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }

        /* Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 275px; border-right: 1px solid var(--border-gray); padding: 10px 20px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
        .feed-content { flex: 1; max-width: 600px; border-right: 1px solid var(--border-gray); min-height: 100vh; }

        /* Component Styles */
        .post-card { padding: 15px; border-bottom: 1px solid var(--border-gray); display: flex; gap: 12px; transition: 0.2s; }
        .post-card:hover { background: rgba(255,255,255,0.02); }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        
        /* Threading CSS */
        .reply-thread-container { margin-left: 52px; border-left: 2px solid var(--border-gray); }
        .reply-card { padding: 10px 15px; display: flex; gap: 10px; font-size: 0.95rem; }
        
        .action-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; margin-top: 8px; transition: 0.2s; }
        .action-btn:hover { color: var(--twitter-blue); }

        .reply-input-box { display: none; padding: 10px 15px; gap: 10px; border-bottom: 1px solid var(--border-gray); background: rgba(29, 155, 240, 0.03); }

        /* Sidebar Nav */
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; transition: 0.2s; margin: 4px 0; }
        .nav-item:hover { background: var(--bg-hover); }
        .nav-item.active { font-weight: bold; color: var(--twitter-blue); }

        .main-btn { width: 100%; padding: 12px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; background: var(--twitter-blue); color: white; transition: 0.2s; }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span { display: none; }
            .reply-thread-container { margin-left: 20px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div style="font-weight: 900; font-size: 2rem; padding: 20px;">P.<span style="color:var(--twitter-blue)">guest</span></div>
            <nav>
                <div class="nav-item active" onclick="switchTab('home', this)"><i data-lucide="home"></i> <span>Feed</span></div>
                <div class="nav-item" onclick="switchTab('messages', this)"><i data-lucide="mail"></i> <span>Messages</span></div>
                <div class="nav-item" onclick="switchTab('profile', this)"><i data-lucide="user"></i> <span>Profile</span></div>
            </nav>
            <button class="main-btn" onclick="handleLogout()" style="margin-top: auto; margin-bottom: 20px; background: transparent; border: 1px solid var(--border-gray);">Logout</button>
        </aside>

        <main class="feed-content">
            <section id="home-view" class="view-section">
                <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border-gray);">Guest Feed</div>
                <div style="padding: 20px; border-bottom: 1px solid var(--border-gray);">
                    <textarea id="postInput" style="width:100%; background:transparent; border:none; color:white; font-size: 1.2rem; resize:none; outline:none;" placeholder="What's happening in the circle?"></textarea>
                    <div style="display: flex; justify-content: flex-end; padding-top: 15px;">
                        <button class="main-btn" style="width:auto; padding: 8px 25px;" onclick="createPost()">Post</button>
                    </div>
                </div>
                <div id="postsContainer"></div>
            </section>

            <section id="messages-view" class="view-section" style="display:none">
                </section>
        </main>
    </div>

    <script>
        const _URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const _KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(_URL, _KEY);

        let currentUser = null;

        async function handleLogout() { await _db.auth.signOut(); window.location.href = 'login-guest.html'; }

        function switchTab(tab, el) {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-view`).style.display = 'block';
            if(el) el.classList.add('active');
            if(tab === 'home') loadPosts();
        }

        // --- UPDATED FEED LOGIC WITH REPLIES ---
        async function loadPosts() {
            const { data: allPosts } = await _db.from('foreigner_posts').select('*').order('created_at', { ascending: false });
            
            const mainPosts = (allPosts || []).filter(p => !p.parent_id);
            const replies = (allPosts || []).filter(p => p.parent_id);

            const container = document.getElementById('postsContainer');
            container.innerHTML = mainPosts.map(p => {
                const postReplies = replies.filter(r => r.parent_id === p.id);
                
                return `
                <div class="post-group" id="group-${p.id}">
                    <div class="post-card">
                        <div class="avatar">${p.username ? p.username[0].toUpperCase() : 'G'}</div>
                        <div style="flex:1">
                            <div style="font-weight: bold;">@${p.username}</div>
                            <div style="margin: 5px 0;">${p.content}</div>
                            <button class="action-btn" onclick="toggleReply('${p.id}')">
                                <i data-lucide="message-circle" style="width:16px"></i> Reply
                            </button>
                        </div>
                    </div>

                    <div id="reply-box-${p.id}" class="reply-input-box">
                        <input type="text" id="input-${p.id}" placeholder="Post your reply" 
                               style="flex:1; background:#16181c; border:none; color:white; padding:10px; border-radius:20px; outline:none;">
                        <button class="main-btn" style="width:auto; padding:5px 15px;" onclick="submitReply('${p.id}')">Reply</button>
                    </div>

                    <div class="reply-thread-container">
                        ${postReplies.map(r => `
                            <div class="reply-card">
                                <div class="avatar" style="width:30px; height:30px; font-size:0.8rem;">${r.username[0].toUpperCase()}</div>
                                <div style="flex:1">
                                    <div style="font-weight:bold; font-size:0.9rem;">@${r.username}</div>
                                    <div style="color:#eff3f4;">${r.content}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');
            
            lucide.createIcons();
        }

        function toggleReply(id) {
            const box = document.getElementById(`reply-box-${id}`);
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
            if(box.style.display === 'flex') document.getElementById(`input-${id}`).focus();
        }

        async function submitReply(parentId) {
            const input = document.getElementById(`input-${parentId}`);
            if(!input.value.trim()) return;

            const { data: prof } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            await _db.from('foreigner_posts').insert([{ 
                user_id: currentUser.id, 
                content: input.value, 
                username: prof.username,
                parent_id: parentId 
            }]);

            input.value = '';
            toggleReply(parentId);
            loadPosts();
        }

        async function createPost() {
            const input = document.getElementById('postInput');
            if(!input.value.trim()) return;
            const { data: prof } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            await _db.from('foreigner_posts').insert([{ user_id: currentUser.id, content: input.value, username: prof.username }]);
            input.value = '';
            loadPosts();
        }

        function setupRealtime() {
            _db.channel('guest-updates').on('postgres_changes', { event: '*', schema: 'public', table: 'foreigner_posts' }, () => {
                loadPosts();
            }).subscribe();
        }

        async function init() {
            lucide.createIcons();
            const { data: { user } } = await _db.auth.getUser();
            if (!user) return window.location.href = 'login-guest.html';
            currentUser = user;
            loadPosts();
            setupRealtime();
        }

        init();
    </script>
</body>
</html>
