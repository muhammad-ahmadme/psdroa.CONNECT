<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Feed | PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --twitter-blue: #1d9bf0;
            --border-gray: #2f3336;
            --text-dim: #71767b;
            --bg-black: #000;
            --bg-hover: rgba(255, 255, 255, 0.05);
        }

        body { background-color: var(--bg-black); color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }

        /* Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 275px; border-right: 1px solid var(--border-gray); padding: 10px 20px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
        .feed-content { flex: 1; max-width: 600px; border-right: 1px solid var(--border-gray); min-height: 100vh; }

        /* Sidebar Nav */
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; transition: 0.2s; margin: 4px 0; }
        .nav-item:hover { background: var(--bg-hover); }
        .nav-item.active { font-weight: bold; color: var(--twitter-blue); }

        /* Messaging UI */
        .dm-layout { display: flex; height: 75vh; border: 1px solid var(--border-gray); border-radius: 16px; overflow: hidden; margin: 20px; background: #000; }
        .dm-sidebar { width: 35%; border-right: 1px solid var(--border-gray); background: rgba(255,255,255,0.02); overflow-y: auto; }
        .dm-main { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        .convo-item { padding: 15px; border-bottom: 1px solid var(--border-gray); cursor: pointer; transition: 0.2s; }
        .convo-item:hover { background: var(--bg-hover); }
        .convo-item.active { background: rgba(29, 155, 240, 0.1); border-left: 4px solid var(--twitter-blue); }

        #chatWindow { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubble Separation */
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--twitter-blue); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #2f3336; color: white; border-bottom-left-radius: 2px; }

        .main-btn { width: 100%; padding: 12px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; background: var(--twitter-blue); color: white; transition: 0.2s; }
        .main-btn:hover { opacity: 0.9; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div style="font-weight: 900; font-size: 2rem; padding: 20px;">P.<span style="color:var(--twitter-blue)">guest</span></div>
            <nav>
                <div class="nav-item active" onclick="switchTab('home', this)"><i data-lucide="home"></i> <span>Feed</span></div>
                <div class="nav-item" onclick="switchTab('messages', this)"><i data-lucide="mail"></i> <span>Messages</span></div>
                <div class="nav-item" onclick="switchTab('profile', this)"><i data-lucide="user"></i> <span>Profile</span></div>
            </nav>
            <button class="main-btn" onclick="handleLogout()" style="margin-top: auto; margin-bottom: 20px; background: transparent; border: 1px solid var(--border-gray);">Logout</button>
        </aside>

        <main class="feed-content">
            <section id="home-view" class="view-section">
                <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border-gray);">Guest Feed</div>
                <div style="padding: 20px; border-bottom: 1px solid var(--border-gray);">
                    <textarea id="postInput" style="width:100%; background:transparent; border:none; color:white; font-size: 1.2rem; resize:none; outline:none;" placeholder="What's happening in the circle?"></textarea>
                    <div style="display: flex; justify-content: flex-end; padding-top: 15px;">
                        <button class="main-btn" style="width:auto; padding: 8px 25px;" onclick="createPost()">Post</button>
                    </div>
                </div>
                <div id="postsContainer"></div>
            </section>

            <section id="messages-view" class="view-section" style="display:none">
                <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border-gray);">Guest Messages</div>
                <div class="dm-layout">
                    <div class="dm-sidebar" id="convoList"></div>
                    <div class="dm-main">
                        <div id="chatWindow">
                            <p style="color:var(--text-dim); text-align:center; margin-top:100px;">Select a conversation to start chatting.</p>
                        </div>
                        <div id="msgInputArea" style="padding:15px; border-top:1px solid var(--border-gray); display:none; gap:12px;">
                            <input type="text" id="dmInput" placeholder="Start a message" style="flex:1; background: #16181c; border: none; color:white; padding: 12px; border-radius: 25px; outline:none;">
                            <button class="main-btn" onclick="sendDM()" style="width: auto; padding: 0 20px;">Send</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="profile-view" class="view-section" style="display:none">
                <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border-gray);">Profile</div>
                <div id="profileContent" style="padding: 40px 20px; text-align: center;"></div>
            </section>
        </main>
    </div>

    <script>
        const _URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const _KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(_URL, _KEY);

        let currentUser = null;
        let activeChatId = null;

        async function handleLogout() { await _db.auth.signOut(); window.location.href = 'login-guest.html'; }

        function switchTab(tab, el) {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-view`).style.display = 'block';
            if(el) el.classList.add('active');
            
            if(tab === 'messages') loadConvoList();
            if(tab === 'profile') loadProfileData();
        }

        // --- MESSAGING LOGIC ---
        async function loadConvoList() {
            const { data: profiles } = await _db.from('profiles').select('id, username').neq('id', currentUser.id);
            const container = document.getElementById('convoList');
            container.innerHTML = (profiles || []).map(p => `
                <div class="convo-item" onclick="openChat('${p.id}', this)">
                    <div style="font-weight:bold;">@${p.username}</div>
                </div>
            `).join('');
        }

        async function openChat(userId, el) {
            activeChatId = userId;
            document.querySelectorAll('.convo-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('msgInputArea').style.display = 'flex';
            loadMessages();
        }

        async function loadMessages() {
            if (!activeChatId) return;
            const { data: msgs } = await _db.from('messages').select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            const win = document.getElementById('chatWindow');
            win.innerHTML = (msgs || []).map(m => `
                <div class="bubble ${m.sender_id === currentUser.id ? 'sent' : 'received'}">${m.content}</div>
            `).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendDM() {
            const input = document.getElementById('dmInput');
            const content = input.value.trim();
            if (!content || !activeChatId) return;

            const { error } = await _db.from('messages').insert([{
                sender_id: currentUser.id,
                receiver_id: activeChatId,
                content
            }]);

            if (!error) { input.value = ''; loadMessages(); }
        }

        // --- FEED LOGIC ---
        async function loadPosts() {
            const { data: posts } = await _db.from('foreigner_posts').select('*').order('created_at', { ascending: false });
            document.getElementById('postsContainer').innerHTML = (posts || []).map(p => `
                <div class="post-card">
                    <div style="width:40px; height:40px; border-radius:50%; background:#333; display:flex; align-items:center; justify-content:center; font-weight:bold;">${p.username ? p.username[0].toUpperCase() : 'G'}</div>
                    <div style="flex:1">
                        <div style="font-weight: bold; margin-bottom: 5px;">@${p.username} <span class="guest-badge">Guest</span></div>
                        <div style="color: white;">${p.content}</div>
                    </div>
                </div>`).join('');
        }

        async function createPost() {
            const input = document.getElementById('postInput');
            if(!input.value.trim()) return;
            const { data: prof } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            await _db.from('foreigner_posts').insert([{ user_id: currentUser.id, content: input.value, username: prof.username }]);
            input.value = '';
            loadPosts();
        }

        async function loadProfileData() {
            const { data: prof } = await _db.from('profiles').select('*').eq('id', currentUser.id).single();
            const { count } = await _db.from('foreigner_posts').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            document.getElementById('profileContent').innerHTML = `
                <div style="width:100px; height:100px; background:var(--twitter-blue); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:900;">${prof.username[0].toUpperCase()}</div>
                <h2>@${prof.username}</h2>
                <p style="color:var(--text-dim);">${currentUser.email}</p>
                <div style="display:flex; justify-content:center; gap:40px; margin-top:30px; border-top:1px solid var(--border-gray); padding-top:20px;">
                    <div><div style="font-size:1.2rem; font-weight:bold;">${count || 0}</div><div style="font-size:0.8rem; color:var(--text-dim);">Posts</div></div>
                    <div><div style="font-size:1.2rem; font-weight:bold; color:var(--twitter-blue);">Guest</div><div style="font-size:0.8rem; color:var(--text-dim);">Account</div></div>
                </div>`;
        }

        function setupRealtime() {
            _db.channel('updates').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, (payload) => {
                if (activeChatId && (payload.new.sender_id === activeChatId || payload.new.receiver_id === activeChatId)) loadMessages();
            }).on('postgres_changes', { event: '*', schema: 'public', table: 'foreigner_posts' }, () => {
                loadPosts();
            }).subscribe();
        }

        async function init() {
            lucide.createIcons();
            const { data: { user } } = await _db.auth.getUser();
            if (!user) return window.location.href = 'login-guest.html';
            currentUser = user;
            loadPosts();
            setupRealtime();
        }

        init();
    </script>
</body>
</html>
