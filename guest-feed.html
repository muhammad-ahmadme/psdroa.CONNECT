<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Feed | PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --twitter-blue: #1d9bf0;
            --border-gray: #2f3336;
            --text-dim: #71767b;
            --bg-black: #000;
        }

        body { background-color: var(--bg-black); color: white; margin: 0; font-family: sans-serif; }

        /* Match the main app layout */
        .dm-layout { display: flex; height: 65vh; border: 1px solid var(--border-gray); border-radius: 16px; overflow: hidden; margin-top: 20px; background: #000; }
        .dm-sidebar { width: 30%; border-right: 1px solid var(--border-gray); background: rgba(255,255,255,0.02); overflow-y: auto; }
        .dm-main { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        .chat-bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; margin-bottom: 8px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--twitter-blue); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #2f3336; color: white; border-bottom-left-radius: 4px; }
        
        .convo-item { padding: 15px; border-bottom: 1px solid var(--border-gray); cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .convo-item:hover { background: rgba(255,255,255,0.05); }
        .convo-item.active { background: rgba(29, 155, 240, 0.1); border-left-color: var(--twitter-blue); }

        .guest-badge { 
            background: rgba(29, 155, 240, 0.1); 
            color: var(--twitter-blue); 
            padding: 2px 10px; 
            border-radius: 12px; 
            font-size: 0.7rem; 
            border: 1px solid var(--twitter-blue);
            margin-left: 8px;
        }

        .post-card { border-bottom: 1px solid var(--border-gray); padding: 20px; transition: 0.2s; }
        .post-card:hover { background: rgba(255,255,255,0.02); }
        
        .composer textarea {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 1.2rem; resize: none; outline: none; padding: 10px 0;
            border-bottom: 1px solid var(--border-gray);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo" style="font-weight: 900; font-size: 2rem; padding: 20px;">P.<span style="color:var(--twitter-blue)">guest</span></div>
            <nav class="side-nav">
                <div class="nav-item active" onclick="switchTab('home', this)"><i data-lucide="home"></i> <span>Feed</span></div>
                <div class="nav-item" onclick="switchTab('messages', this)"><i data-lucide="mail"></i> <span>Messages</span></div>
                <div class="nav-item" onclick="switchTab('profile', this)"><i data-lucide="user"></i> <span>Profile</span></div>
            </nav>
            <button class="logout-btn" onclick="handleLogout()" style="margin-top: auto; margin-bottom: 20px;">Logout</button>
        </aside>

        <main class="feed-content" style="border-left: 1px solid var(--border-gray); border-right: 1px solid var(--border-gray); max-width: 600px;">
            
            <section id="home-view" class="view-section">
                <div class="feed-header" style="backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 10; padding: 15px; border-bottom: 1px solid var(--border-gray); background: rgba(0,0,0,0.7);">
                    <h2 style="margin:0; font-size: 1.2rem;">Guest Feed</h2>
                </div>
                <div class="composer" style="padding: 20px;">
                    <textarea id="postInput" placeholder="What's happening in the circle?"></textarea>
                    <div style="display: flex; justify-content: flex-end; padding-top: 15px;">
                        <button class="post-btn" style="background: var(--twitter-blue); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer;" onclick="createPost()">Post</button>
                    </div>
                </div>
                <div id="postsContainer"></div>
            </section>

            <section id="messages-view" class="view-section" style="display:none">
                <div class="feed-header" style="padding: 15px; border-bottom: 1px solid var(--border-gray);">
                    <h2 style="margin:0; font-size: 1.2rem;">Guest Messages</h2>
                </div>
                <div class="dm-layout">
                    <div class="dm-sidebar" id="activeConvos"></div>
                    <div class="dm-main">
                        <div id="chatWindow" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column;">
                            <p id="chatPlaceholder" style="color:var(--text-dim); text-align:center; margin-top:100px;">Choose a guest to message</p>
                        </div>
                        <div style="padding:20px; border-top:1px solid var(--border-gray); display:flex; gap:12px; background: #000;">
                            <input type="text" id="dmInput" placeholder="Start a message" style="flex:1; background: #16181c; border: 1px solid var(--border-gray); color:white; outline:none; padding: 12px; border-radius: 25px;">
                            <button class="post-btn" onclick="sendDM()" style="background: var(--twitter-blue); color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold;">Send</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="profile-view" class="view-section" style="display:none">
                <div class="feed-header" style="padding: 15px; border-bottom: 1px solid var(--border-gray);">
                    <h2 style="margin:0; font-size: 1.2rem;">Profile</h2>
                </div>
                <div style="padding: 40px 20px; text-align: center;">
                    <div id="profileInitial" style="width:100px; height:100px; background:var(--twitter-blue); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:900;">G</div>
                    <h2 id="profileUsername" style="margin-bottom: 5px;">@guest</h2>
                    <p id="profileEmail" style="color:var(--text-dim); margin-top: 0;"></p>
                    <div style="display:flex; justify-content:center; gap:40px; margin-top: 30px; border-top:1px solid var(--border-gray); padding-top:30px;">
                        <div><div id="postCount" style="font-size: 1.2rem; font-weight:bold;">0</div><div style="font-size:0.8rem; color:var(--text-dim);">Posts</div></div>
                        <div><div style="font-size: 1.2rem; font-weight:bold; color:var(--twitter-blue);">Guest</div><div style="font-size:0.8rem; color:var(--text-dim);">Account</div></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const _URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const _KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(_URL, _KEY);

        let currentUser = null;
        let activeChatId = null;

        async function init() {
            const { data: { user } } = await _db.auth.getUser();
            if (!user) return window.location.href = 'login-guest.html';
            currentUser = user;
            loadPosts();
            setupRealtime();
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-view`).style.display = 'block';
            el.classList.add('active');
            if(tab === 'profile') loadProfileData();
            if(tab === 'messages') loadConversations();
        }

        async function loadProfileData() {
            const { data: profile } = await _db.from('profiles').select('*').eq('id', currentUser.id).single();
            const { count } = await _db.from('foreigner_posts').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            if(profile) {
                document.getElementById('profileUsername').innerText = `@${profile.username}`;
                document.getElementById('profileEmail').innerText = currentUser.email;
                document.getElementById('profileInitial').innerText = profile.username[0].toUpperCase();
                document.getElementById('postCount').innerText = count || 0;
            }
        }

        async function loadPosts() {
            const { data: posts } = await _db.from('foreigner_posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('postsContainer');
            container.innerHTML = posts.map(p => `
                <div class="post-card">
                    <div style="font-weight: bold; margin-bottom: 5px;">@${p.username} <span class="guest-badge">Guest</span></div>
                    <div style="color: white; line-height: 1.5; font-size: 1rem;">${p.content}</div>
                </div>`).join('');
        }

        async function createPost() {
            const input = document.getElementById('postInput');
            const content = input.value.trim();
            if(!content) return;
            const { data: profile } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            await _db.from('foreigner_posts').insert([{ user_id: currentUser.id, content, username: profile.username }]);
            input.value = '';
            loadPosts();
        }

        async function loadConversations() {
            const { data: profiles } = await _db.from('profiles').select('*').neq('id', currentUser.id);
            document.getElementById('activeConvos').innerHTML = profiles.map(p => `
                <div class="convo-item" onclick="openChat('${p.id}', this)">@${p.username}</div>
            `).join('');
        }

        async function openChat(userId, el) {
            activeChatId = userId;
            document.querySelectorAll('.convo-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('chatPlaceholder').style.display = 'none';
            loadMessages();
        }

        async function loadMessages() {
            if (!activeChatId) return;
            const { data: msgs } = await _db.from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            const win = document.getElementById('chatWindow');
            win.innerHTML = msgs.map(m => `<div class="chat-bubble ${m.sender_id === currentUser.id ? 'sent' : 'received'}">${m.content}</div>`).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendDM() {
            const input = document.getElementById('dmInput');
            const content = input.value.trim();
            if (!content || !activeChatId) return;
            await _db.from('messages').insert([{ sender_id: currentUser.id, receiver_id: activeChatId, content }]);
            input.value = '';
            loadMessages();
        }

        function setupRealtime() {
            _db.channel('guest_updates').on('postgres_changes', { event: '*', schema: 'public' }, () => {
                loadPosts();
                if(activeChatId) loadMessages();
            }).subscribe();
        }

        async function handleLogout() { 
            await _db.auth.signOut(); 
            window.location.href = 'login-guest.html'; 
        }
        init();
    </script>
</body>
</html>
