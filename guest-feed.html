<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSDROA.connect | Ultimate</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --connect-blue: #1d9bf0;
            --border-dark: #2f3336;
            --text-main: #eff3f4;
            --text-dim: #71767b;
            --bg-black: #000;
            --bg-glass: rgba(0, 0, 0, 0.85);
        }

        body { 
            background-color: var(--bg-black); color: var(--text-main); margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden;
        }

        #auth-shield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .app-container { display: flex; min-height: 100vh; max-width: 1250px; margin: 0 auto; opacity: 0; transition: opacity 0.5s; }

        /* Sidebar Navigation */
        .sidebar { 
            width: 275px; border-right: 1px solid var(--border-dark); padding: 10px 12px; 
            display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; 
        }
        .nav-item { 
            display: flex; align-items: center; gap: 18px; padding: 14px 20px; font-size: 1.25rem; 
            cursor: pointer; border-radius: 30px; transition: 0.2s; margin: 2px 0;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { font-weight: 800; color: var(--connect-blue); }

        /* Main Content Area */
        .feed-content { flex: 1; max-width: 600px; border-right: 1px solid var(--border-dark); min-height: 100vh; }
        
        .post-card { padding: 16px; display: flex; gap: 12px; border-bottom: 1px solid var(--border-dark); transition: 0.2s; }
        .post-card:hover { background: rgba(255,255,255,0.02); }

        .user-avatar { 
            width: 48px; height: 48px; border-radius: 50%; background: #333; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; cursor: pointer;
        }

        .username { font-weight: 700; cursor: pointer; color: white; }
        .username:hover { text-decoration: underline; }

        /* Insane Messaging UI */
        .dm-layout { display: flex; height: 100vh; }
        .dm-sidebar { width: 350px; border-right: 1px solid var(--border-dark); overflow-y: auto; }
        .convo-item { padding: 15px; display: flex; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .convo-item.active { background: rgba(29, 155, 240, 0.1); border-right: 3px solid var(--connect-blue); }
        .msg-badge { background: var(--connect-blue); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; margin-left: auto; }
        
        #chatWindow { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; background: #000; }
        .bubble { max-width: 70%; padding: 10px 16px; font-size: 15px; border-radius: 18px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--connect-blue); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #2f3336; border-bottom-left-radius: 4px; }

        /* Utility */
        .main-btn { background: var(--connect-blue); color: white; border: none; border-radius: 30px; padding: 10px 24px; font-weight: 700; cursor: pointer; }
        .main-btn.outline { background: transparent; border: 1px solid var(--border-dark); color: white; }
        .main-btn:disabled { opacity: 0.5; }

        @media (max-width: 1000px) { .sidebar { width: 80px; } .sidebar span { display: none; } }
    </style>
</head>
<body>

    <div id="auth-shield">
        <div style="font-weight: 900; font-size: 3rem; letter-spacing: -2px;">PSDROA</div>
        <div style="color: var(--connect-blue); margin-top: 10px; font-weight: bold;">ENCRYPTING SESSION...</div>
    </div>

    <div class="app-container" id="main-app">
        <aside class="sidebar">
            <div style="font-weight: 900; font-size: 1.8rem; padding: 15px; margin-bottom: 20px;">P.</div>
            <nav style="flex: 1;">
                <div class="nav-item active" id="nav-home" onclick="switchTab('home', this)"><i data-lucide="home"></i> <span>Home</span></div>
                <div class="nav-item" id="nav-messages" onclick="switchTab('messages', this)"><i data-lucide="mail"></i> <span>Messages</span></div>
                <div class="nav-item" id="nav-profile" onclick="switchTab('profile', this)"><i data-lucide="user"></i> <span>Profile</span></div>
            </nav>
            <button class="main-btn outline" onclick="handleLogout()" style="margin-bottom: 20px;">Logout</button>
        </aside>

        <main class="feed-content">
            <section id="home-view" class="view-section">
                <div style="padding:15px; font-weight:800; font-size:1.2rem; border-bottom:1px solid var(--border-dark); background:var(--bg-glass); backdrop-filter:blur(10px); position:sticky; top:0; z-index:10;">Home</div>
                <div style="padding: 16px; border-bottom: 1px solid var(--border-dark); display: flex; gap: 12px;">
                    <div class="user-avatar" id="my-avatar">?</div>
                    <div style="flex: 1;">
                        <textarea id="postInput" style="width:100%; background:transparent; border:none; color:white; font-size:1.2rem; outline:none; resize:none;" placeholder="What's on your mind?"></textarea>
                        <div id="mPreview" style="display:none; margin-top:10px; position:relative;">
                            <img id="pImg" src="" style="width:100%; border-radius:15px;">
                            <button onclick="clearMedia()" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); color:white; border:none; border-radius:50%; cursor:pointer;">&times;</button>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; border-top:1px solid var(--border-dark); padding-top:10px;">
                            <div style="color:var(--connect-blue); cursor:pointer;" onclick="document.getElementById('fileInp').click()"><i data-lucide="image"></i></div>
                            <input type="file" id="fileInp" hidden accept="image/*" onchange="handlePreview()">
                            <button class="main-btn" id="postBtn" onclick="createPost()">Post</button>
                        </div>
                    </div>
                </div>
                <div id="postsContainer"></div>
            </section>

            <section id="messages-view" class="view-section" style="display:none">
                <div class="dm-layout">
                    <div class="dm-sidebar" id="convoList"></div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <div id="chatHeader" style="padding:15px; border-bottom:1px solid var(--border-dark); font-weight:bold; display:none;"></div>
                        <div id="chatWindow"></div>
                        <div id="msgBox" style="padding:15px; border-top:1px solid var(--border-dark); display:none; gap:10px;">
                            <input type="text" id="dmInp" style="flex:1; background:#202327; border:none; color:white; padding:12px; border-radius:20px;" placeholder="Message..." onkeypress="if(event.key==='Enter')sendDM()">
                            <button class="main-btn" onclick="sendDM()">Send</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="profile-view" class="view-section" style="display:none">
                <div id="profileContent"></div>
            </section>
        </main>
    </div>

    <script>
        const _URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const _KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(_URL, _KEY);
        
        let currentUser = null, myName = "", activeChatId = null;

        async function init() {
            const { data: { session } } = await _db.auth.getSession();
            if(!session) return window.location.replace('login.html');
            currentUser = session.user;
            const { data: p } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            myName = p?.username || "User";
            document.getElementById('my-avatar').innerText = myName[0].toUpperCase();
            document.getElementById('main-app').style.opacity = '1';
            document.getElementById('auth-shield').remove();
            loadPosts();
            setupRealtime();
            lucide.createIcons();
        }

        /* --- POSTING & FEED --- */
        function handlePreview() {
            const file = document.getElementById('fileInp').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('pImg').src = e.target.result; document.getElementById('mPreview').style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        }
        function clearMedia() { document.getElementById('fileInp').value = ""; document.getElementById('mPreview').style.display = 'none'; }

        async function createPost() {
            const txt = document.getElementById('postInput').value.trim();
            const file = document.getElementById('fileInp').files[0];
            if(!txt && !file) return;
            document.getElementById('postBtn').disabled = true;
            let mUrl = null;
            if(file) {
                const fName = `${Date.now()}-${file.name}`;
                await _db.storage.from('media').upload(fName, file);
                mUrl = _db.storage.from('media').getPublicUrl(fName).data.publicUrl;
            }
            await _db.from('foreigner_posts').insert([{ user_id: currentUser.id, username: myName, content: txt, media_url: mUrl }]);
            document.getElementById('postInput').value = ""; clearMedia();
            document.getElementById('postBtn').disabled = false;
            loadPosts();
        }

        async function loadPosts() {
            const { data: posts } = await _db.from('foreigner_posts').select('*').order('created_at', { ascending: false });
            const cont = document.getElementById('postsContainer');
            cont.innerHTML = (posts || []).map(p => `
                <div class="post-card">
                    <div class="user-avatar" onclick="viewUserProfile('${p.user_id}')">${p.username[0].toUpperCase()}</div>
                    <div style="flex:1">
                        <span class="username" onclick="viewUserProfile('${p.user_id}')">@${p.username}</span>
                        <div style="margin-top:4px;">${p.content}</div>
                        ${p.media_url ? `<img src="${p.media_url}" style="width:100%; border-radius:15px; margin-top:10px; border:1px solid var(--border-dark);">` : ''}
                    </div>
                </div>`).join('');
        }

        /* --- MESSAGING & FOLLOWS --- */
        function viewUserProfile(uid) { switchTab('profile', document.getElementById('nav-profile')); loadProfile(uid); }
        
        async function loadProfile(uid) {
            const id = uid || currentUser.id;
            const { data: p } = await _db.from('profiles').select('*').eq('id', id).single();
            const { count: followers } = await _db.from('followers').select('*', { count: 'exact', head: true }).eq('following_id', id);
            const { count: following } = await _db.from('followers').select('*', { count: 'exact', head: true }).eq('follower_id', id);
            
            let isFollowing = false;
            if(id !== currentUser.id) {
                const { data: check } = await _db.from('followers').select('*').eq('follower_id', currentUser.id).eq('following_id', id).single();
                isFollowing = !!check;
            }

            document.getElementById('profileContent').innerHTML = `
                <div style="height:150px; background:#222;"></div>
                <div style="padding:15px; position:relative;">
                    <div style="width:100px; height:100px; border-radius:50%; background:var(--connect-blue); border:4px solid black; margin-top:-60px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold;">${p.username[0].toUpperCase()}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <div><h2 style="margin:0;">${p.username}</h2><div style="color:gray;">@${p.username.toLowerCase()}</div></div>
                        ${id !== currentUser.id ? `<button class="main-btn ${isFollowing ? 'outline' : ''}" onclick="toggleFollow('${id}', ${isFollowing})">${isFollowing ? 'Following' : 'Follow'}</button>` : ''}
                    </div>
                    <div style="display:flex; gap:20px; margin-top:15px; color:gray;">
                        <span><b style="color:white;">${following}</b> Following</span>
                        <span><b style="color:white;">${followers}</b> Followers</span>
                    </div>
                    ${id !== currentUser.id ? `<button class="main-btn" style="margin-top:15px; width:100%;" onclick="startChat('${id}', '${p.username}')">Message</button>` : ''}
                </div>`;
        }

        async function toggleFollow(tid, state) {
            if(state) await _db.from('followers').delete().eq('follower_id', currentUser.id).eq('following_id', tid);
            else await _db.from('followers').insert({ follower_id: currentUser.id, following_id: tid });
            loadProfile(tid);
        }

        /* --- MESSAGES --- */
        async function loadConvos() {
            const { data: users } = await _db.from('profiles').select('id, username').neq('id', currentUser.id);
            document.getElementById('convoList').innerHTML = (users || []).map(u => `
                <div class="convo-item ${activeChatId === u.id ? 'active' : ''}" onclick="openChat('${u.id}', '${u.username}')">
                    <div class="user-avatar" style="width:40px; height:40px;">${u.username[0].toUpperCase()}</div>
                    <div><b>@${u.username}</b><div style="font-size:0.8rem; color:gray;">Click to chat</div></div>
                </div>`).join('');
        }

        async function openChat(uid, name) {
            activeChatId = uid;
            document.getElementById('chatHeader').style.display = 'block';
            document.getElementById('chatHeader').innerText = `@${name}`;
            document.getElementById('msgBox').style.display = 'flex';
            loadMessages(); loadConvos();
        }

        async function loadMessages() {
            if(!activeChatId) return;
            const { data: msgs } = await _db.from('messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`).order('created_at', { ascending: true });
            const win = document.getElementById('chatWindow');
            win.innerHTML = (msgs || []).map(m => `<div class="bubble ${m.sender_id === currentUser.id ? 'sent' : 'received'}">${m.content}</div>`).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendDM() {
            const txt = document.getElementById('dmInp').value.trim();
            if(!txt) return;
            await _db.from('messages').insert([{ sender_id: currentUser.id, receiver_id: activeChatId, content: txt }]);
            document.getElementById('dmInp').value = ""; loadMessages();
        }

        function startChat(uid, name) { switchTab('messages', document.getElementById('nav-messages')); setTimeout(() => openChat(uid, name), 200); }

        /* --- SYSTEM --- */
        function switchTab(tab, el) {
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-view`).style.display = 'block';
            el.classList.add('active');
            if(tab === 'messages') loadConvos();
            if(tab === 'profile') loadProfile(currentUser.id);
        }

        async function handleLogout() { await _db.auth.signOut(); localStorage.clear(); window.location.replace('login.html'); }
        
        function setupRealtime() {
            _db.channel('db-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'foreigner_posts' }, () => loadPosts()).subscribe();
        }

        init();
    </script>
</body>
</html>
