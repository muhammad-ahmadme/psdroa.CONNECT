<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSDROA.connect | Network Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --connect-blue: #1d9bf0;
            --border-dark: #2f3336;
            --text-main: #eff3f4;
            --text-dim: #71767b;
            --bg-black: #000;
        }

        #auth-shield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        body { 
            background-color: var(--bg-black); color: var(--text-main); margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        .app-container { display: flex; min-height: 100vh; max-width: 1250px; margin: 0 auto; opacity: 0; transition: opacity 0.4s; }
        
        /* Sidebar */
        .sidebar { 
            width: 275px; border-right: 1px solid var(--border-dark); padding: 10px 12px; 
            display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; 
        }

        .nav-item { 
            display: flex; align-items: center; gap: 18px; padding: 14px 20px; font-size: 1.25rem; 
            cursor: pointer; border-radius: 30px; transition: 0.2s; margin: 2px 0;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { font-weight: 800; color: var(--connect-blue); }

        /* Feed */
        .feed-content { flex: 1; max-width: 600px; border-right: 1px solid var(--border-dark); min-height: 100vh; }
        
        .post-card { padding: 16px; display: flex; gap: 12px; border-bottom: 1px solid var(--border-dark); transition: 0.2s; }
        .post-card:hover { background: rgba(255,255,255,0.02); }

        .user-avatar { 
            width: 48px; height: 48px; border-radius: 50%; background: #333; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0;
        }

        .username { font-weight: 700; cursor: pointer; color: white; text-decoration: none; }
        .username:hover { text-decoration: underline; }

        /* Buttons */
        .main-btn { 
            background: var(--connect-blue); color: white; border: none; border-radius: 30px; 
            padding: 10px 24px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .main-btn.alt { background: white; color: black; }
        .main-btn.outline { background: transparent; border: 1px solid var(--border-dark); color: white; }

        /* Profile Special UI */
        .profile-banner { height: 150px; background: #222; width: 100%; }
        .profile-stats { display: flex; gap: 20px; margin-top: 15px; color: var(--text-dim); }
        .stat-num { color: white; font-weight: 800; }

        @media (max-width: 1000px) { .sidebar { width: 80px; } .sidebar span { display: none; } }
    </style>
</head>
<body>

    <div id="auth-shield">
        <div style="font-weight: 900; font-size: 2.5rem;">PSDROA</div>
        <div style="color: var(--text-dim); margin-top: 10px;">Building Network Graph...</div>
    </div>

    <div class="app-container" id="main-app">
        <aside class="sidebar">
            <div style="font-weight: 900; font-size: 1.8rem; padding: 15px;">P.</div>
            <nav style="flex: 1;">
                <div class="nav-item active" id="nav-home" onclick="switchTab('home', this)"><i data-lucide="home"></i> <span>Home</span></div>
                <div class="nav-item" id="nav-messages" onclick="switchTab('messages', this)"><i data-lucide="mail"></i> <span>Messages</span></div>
                <div class="nav-item" id="nav-profile" onclick="switchTab('profile', this)"><i data-lucide="user"></i> <span>Profile</span></div>
            </nav>
            <button class="main-btn outline" onclick="handleLogout()" style="margin-bottom: 20px;">Logout</button>
        </aside>

        <main class="feed-content">
            <section id="home-view" class="view-section">
                <div style="padding:15px; font-weight:800; font-size:1.2rem; border-bottom:1px solid var(--border-dark); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top:0; z-index: 10;">Home</div>
                <div id="postsContainer"></div>
            </section>

            <section id="messages-view" class="view-section" style="display:none"></section>

            <section id="profile-view" class="view-section" style="display:none">
                <div id="profileContent"></div>
            </section>
        </main>
    </div>

    <script>
        const _URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const _KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(_URL, _KEY);
        
        let currentUser = null;
        let myUser = "";

        async function init() {
            const { data: { session } } = await _db.auth.getSession();
            if(!session) return window.location.replace('login.html');
            
            currentUser = session.user;
            const { data: p } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            myUser = p?.username || "user";
            
            document.getElementById('main-app').style.opacity = '1';
            document.getElementById('auth-shield').remove();

            loadPosts();
            setupRealtime();
            lucide.createIcons();
        }

        /* --- FEED --- */
        async function loadPosts() {
            const { data: posts } = await _db.from('foreigner_posts').select('*').order('created_at', { ascending: false });
            const cont = document.getElementById('postsContainer');
            cont.innerHTML = "";
            (posts || []).forEach(p => {
                if(!p.parent_id) renderPost(p, cont);
            });
        }

        function renderPost(p, target) {
            const html = `
                <div class="post-card">
                    <div class="user-avatar" onclick="viewUserProfile('${p.user_id}')" style="cursor:pointer">${p.username[0].toUpperCase()}</div>
                    <div style="flex:1">
                        <span class="username" onclick="viewUserProfile('${p.user_id}')">@${p.username}</span>
                        <div style="margin-top:4px;">${p.content}</div>
                        ${p.media_url ? `<div style="margin-top:12px; border-radius:15px; overflow:hidden; border:1px solid var(--border-dark);"><img src="${p.media_url}" style="width:100%;"></div>` : ''}
                    </div>
                </div>`;
            target.insertAdjacentHTML('beforeend', html);
        }

        /* --- REFINED FOLLOW SYSTEM --- */
        function viewUserProfile(uid) { switchTab('profile', document.getElementById('nav-profile')); loadProfile(uid); }

        async function loadProfile(targetUid) {
            const id = targetUid || currentUser.id;
            const isMe = id === currentUser.id;

            // Fetch Data
            const { data: profile } = await _db.from('profiles').select('*').eq('id', id).single();
            const { count: posts } = await _db.from('foreigner_posts').select('*', { count: 'exact', head: true }).eq('user_id', id);
            const { count: followers } = await _db.from('followers').select('*', { count: 'exact', head: true }).eq('following_id', id);
            const { count: following } = await _db.from('followers').select('*', { count: 'exact', head: true }).eq('follower_id', id);
            
            // Check if I follow them
            let amIFollowing = false;
            if(!isMe) {
                const { data: check } = await _db.from('followers').select('*').eq('follower_id', currentUser.id).eq('following_id', id).single();
                amIFollowing = !!check;
            }

            document.getElementById('profileContent').innerHTML = `
                <div class="profile-banner"></div>
                <div style="padding:15px; position:relative;">
                    <div style="width:120px; height:120px; border-radius:50%; background:var(--connect-blue); border:4px solid black; margin-top:-70px; display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:bold; overflow:hidden;">
                        ${profile.username[0].toUpperCase()}
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-top:10px;">
                        <div>
                            <h2 style="margin:0;">${profile.username}</h2>
                            <div style="color:var(--text-dim);">@${profile.username.toLowerCase()}</div>
                        </div>
                        ${!isMe ? `
                            <button class="main-btn ${amIFollowing ? 'outline' : 'alt'}" onclick="toggleFollow('${id}', ${amIFollowing})">
                                ${amIFollowing ? 'Following' : 'Follow'}
                            </button>
                        ` : ''}
                    </div>

                    <div class="profile-stats">
                        <span><span class="stat-num">${posts}</span> Posts</span>
                        <span><span class="stat-num">${following}</span> Following</span>
                        <span><span class="stat-num">${followers}</span> Followers</span>
                    </div>
                </div>
                <div id="userPosts" style="border-top:1px solid var(--border-dark); margin-top:20px;"></div>
            `;
            
            const { data: uposts } = await _db.from('foreigner_posts').select('*').eq('user_id', id).order('created_at', { ascending: false });
            (uposts || []).forEach(up => renderPost(up, document.getElementById('userPosts')));
        }

        async function toggleFollow(targetId, isFollowing) {
            if(isFollowing) {
                await _db.from('followers').delete().eq('follower_id', currentUser.id).eq('following_id', targetId);
            } else {
                await _db.from('followers').insert({ follower_id: currentUser.id, following_id: targetId });
            }
            loadProfile(targetId); // Refresh UI
        }

        /* --- UTILS --- */
        function switchTab(tab, el) {
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-view`).style.display = 'block';
            el.classList.add('active');
            if(tab === 'profile') loadProfile(currentUser.id);
        }

        async function handleLogout() { await _db.auth.signOut(); localStorage.clear(); window.location.replace('login.html'); }
        
        function setupRealtime() {
            _db.channel('global').on('postgres_changes', { event: '*', schema: 'public', table: 'foreigner_posts' }, () => loadPosts()).subscribe();
        }

        init();
    </script>
</body>
</html>
