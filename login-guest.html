<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Login | PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-wrapper">

    <div class="auth-box">
        <div class="nav-logo" style="padding: 0; margin-bottom: 10px;">
            P.<span style="color: var(--twitter-blue);">guest</span>
        </div>
        
        <h1>Guest Sign In</h1>

        <div id="loginError" class="error-banner" style="display:none;"></div>

        <div class="login-form-container">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="Email" required>
            
            <label for="loginPass">Password</label>
            <input type="password" id="loginPass" placeholder="Password" required>
            
            <button onclick="handleGuestLogin()" id="loginBtn" class="main-btn">
                Sign In
            </button>
        </div>

        <div class="auth-footer" style="margin-top: 30px; text-align: center;">
            <p style="color: var(--text-dim); margin-bottom: 10px;">
                Don't have a guest account? 
                <a href="signup-guest.html" style="color: var(--twitter-blue); text-decoration: none; font-weight: 600;">Register here</a>
            </p>
            <p>
                <a href="login.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.85rem; opacity: 0.7;">Student Sign In</a>
            </p>
        </div>
    </div>

    <script>
        // --- FOREIGNER PROJECT CONFIG (Project B) - UNTOUCHED LOGIC ---
        const G_URL = 'https://aelkiokxzzfnfvermrjy.supabase.co';
        const G_KEY = 'sb_publishable_r8ncudJ8R49sXNlsE3OKvA_D4Ak_CHC';
        const _db = supabase.createClient(G_URL, G_KEY);

        async function handleGuestLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errBox = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errBox.style.display = 'none';
            if(!email || !pass) {
                errBox.innerText = "Please enter email and password.";
                errBox.style.display = 'block';
                return;
            }

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            const { data, error } = await _db.auth.signInWithPassword({
                email: email,
                password: pass
            });

            if (error) {
                errBox.innerText = error.message;
                errBox.style.display = 'block';
                btn.innerText = "Sign In";
                btn.disabled = false;
            } else {
                // Success! Redirect to the Foreigner Feed
                window.location.href = 'guest-feed.html';
            }
        }
    </script>
</body>
</html>
