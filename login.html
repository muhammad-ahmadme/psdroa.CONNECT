<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-wrapper"> <div class="auth-box"> <div class="nav-logo" style="padding: 0; margin-bottom: 20px;">P.</div>
        <h1>Sign in to PSDROA</h1>
        
        <div id="loginError" class="error-banner" style="display: none;"></div>

        <div class="login-form-container">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="School Email" required>
            
            <label for="loginPass">Password</label>
            <input type="password" id="loginPass" placeholder="Password" required>
            
            <button class="main-btn" onclick="handleSignIn()">Log In</button>
        </div>
        
        <div class="auth-footer" style="margin-top: 30px; text-align: center;">
            <p style="color: var(--text-dim);">New here? 
                <a href="index.html" style="color: var(--twitter-blue); text-decoration: none; font-weight: 600;">Request Access</a>
            </p>
        </div>
    </div>

<script>
(function() {
    // Project Config
    const PROJECT_URL = 'https://riyqmlarvhipiwrhvuiw.supabase.co';
    const ANON_KEY = 'sb_publishable_V1xXAdHLwMRjQuR5BHaG7A_6jat6I_E';
    
    // Initialize Supabase
    const _supabase = supabase.createClient(PROJECT_URL, ANON_KEY);

    window.handleSignIn = async function() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPass').value;
        const errorBox = document.getElementById('loginError');

        // Reset UI
        errorBox.style.display = 'none';
        
        if (!email || !password) {
            errorBox.innerText = "Please fill in all fields.";
            errorBox.style.display = 'block';
            return;
        }

        try {
            // 1. Authenticate
            const { data, error: authError } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (authError) {
                errorBox.innerText = "Invalid email or password.";
                errorBox.style.display = 'block';
                return;
            }

            // 2. Check Profile Verification
            const { data: profile, error: profileError } = await _supabase
                .from('profiles')
                .select('is_verified')
                .eq('id', data.user.id)
                .single();

            if (profileError || !profile.is_verified) {
                errorBox.innerText = "Access Pending. Please wait 24h for admin approval.";
                errorBox.style.display = 'block';
                await _supabase.auth.signOut();
                return;
            }

            // 3. Success
            window.location.href = 'feed.html';

        } catch (err) {
            console.error("Login System Error:", err);
            errorBox.innerText = "System error. Please try again.";
            errorBox.style.display = 'block';
        }
    };
})();
</script>
</body>
</html>
