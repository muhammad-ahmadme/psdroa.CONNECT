<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login / PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="center-body">
    <div class="auth-box login-box">
        <div class="logo-center">P.</div>
        <h2>Sign in to PSDROA</h2>
        
        <div id="loginError" class="error-banner"></div>

        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="School Email">
            <input type="password" id="loginPass" placeholder="Password">
        </div>
        
        <button class="main-btn" onclick="handleSignIn()">Log In</button>
        
        <p class="footer-text">New here? <a href="index.html">Request Access</a></p>
    </div>

    <script>
        const supabase = supabase.createClient('https://riyqmlarvhipiwrhvuiw.supabase.co', 'sb_publishable_V1xXAdHLwMRjQuR5BHaG7A_6jat6I_E');

        async function handleSignIn() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            const errorBox = document.getElementById('loginError');

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorBox.innerText = "Invalid credentials.";
                errorBox.style.display = 'block';
                return;
            }

            // CHECK IF ADMIN FLIPPED THE SWITCH
            const { data: profile } = await supabase.from('profiles').select('is_verified').eq('id', data.user.id).single();

            if (profile && profile.is_verified) {
                window.location.href = 'feed.html';
            } else {
                errorBox.innerText = "Account pending. Wait for the 24h approval.";
                errorBox.style.display = 'block';
                await supabase.auth.signOut();
            }
        }
    </script>
</body>
</html>
