<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules | PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-box" style="max-width: 500px; text-align: left;">
            <div class="logo" style="font-size: 2.5rem; margin-bottom: 10px; font-weight: 900; text-align: center;">P.</div>
            
            <h1 style="text-align: center; margin-bottom: 30px;">Student Code of Conduct</h1>
            
            <div class="card" style="margin-bottom: 20px; border: 1px solid var(--border-gray);">
                <h3 style="color: var(--twitter-blue); margin-bottom: 10px;">1. Be APS Friendly</h3>
                <p style="color: var(--text-dim); font-size: 0.95rem;">Keep all discussions respectful.</p>
            </div>

            <div class="card" style="margin-bottom: 20px; border: 1px solid var(--border-gray);">
                <h3 style="color: var(--twitter-blue); margin-bottom: 10px;">2. Privacy First</h3>
                <p style="color: var(--text-dim); font-size: 0.95rem;">Do not share personal phone numbers, and Home adresses</p>
            </div>

            <div class="card" style="margin-bottom: 20px; border: 1px solid var(--border-gray);">
                <h3 style="color: var(--twitter-blue); margin-bottom: 10px;">3. No Spam</h3>
                <p style="color: var(--text-dim); font-size: 0.95rem;">Avoid flooding the feed with repetitive content or commercial advertisements.</p>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html" class="main-btn" style="text-decoration: none; display: inline-block;">I Understand, Go Back</a>
            </div>
        </div>
    </div>

</body>
</html>
