<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSDROA.connect | Amity Sharjah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PSDROA<span>.connect</span></div>
    </nav>

    <main class="hero" id="mainHero">
        <div id="requestForm">
            <h1>Join the circle.</h1>
            <p>Verified Amity Sharjah students only.</p>
            
            <div id="errorBox" style="color: #f4212e; display: none; margin-bottom: 10px;">
                Invalid credentials. Access denied.
            </div>

            <input type="text" id="username" placeholder="Username">
            <input type="email" id="email" placeholder="aps... @amitysharjah.ae">
            <input type="password" id="password" placeholder="Create Password">
            
            <button class="nav-btn" onclick="submitToWaitingLine()">Let's Get Started</button>
        </div>

        <div id="waitingLine" style="display: none; text-align: center;">
            <h1 style="font-size: 4rem;">⏳</h1>
            <h2>You're in the waiting line.</h2>
            <p>Your request has been sent to <strong>inquiries@psdroa.co.uk</strong>.</p>
            <p>Please wait <strong>24 hours</strong> for manual approval by the admin.</p>
        </div>
    </main>

    <script>
        async function submitToWaitingLine() {
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username, password })
            });

            if (response.ok) {
                document.getElementById('requestForm').style.display = 'none';
                document.getElementById('waitingLine').style.display = 'block';
            } else {
                document.getElementById('errorBox').style.display = 'block';
            }
        }
    </script>
</body>
</html>
