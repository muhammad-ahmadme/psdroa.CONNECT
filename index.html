<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-box">
            <div style="color:var(--twitter-blue); font-size:2rem; font-weight:900; margin-bottom:20px;">
                PSDROA<span style="color:white">.connect</span>
            </div>
            
            <h1>Join the circle.</h1>
            <p style="color:var(--text-dim); margin-bottom:30px;">Verified Amity Sharjah students only.</p>

            <div id="loginError" class="error-banner" style="display:none"></div>

            <input type="email" id="email" placeholder="aps.name@amitysharjah.ae">
            <input type="password" id="password" placeholder="Password">

            <button class="main-btn" onclick="handleLogin()">Log In</button>

            <p style="color:var(--text-dim); font-size:0.8rem; margin-top:25px;">
                By joining, you agree to the student code of conduct.
            </p>
        </div>
    </div>

    <script>
        const _URL = 'https://riyqmlarvhipiwrhvuiw.supabase.co';
        const _KEY = 'sb_publishable_V1xXAdHLwMRjQuR5BHaG7A_6jat6I_E';
        const _db = supabase.createClient(_URL, _KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('loginError');

            const { data, error } = await _db.auth.signInWithPassword({ email, password });

            if (error) {
                errorBox.innerText = "Invalid credentials. Access denied.";
                errorBox.style.display = "block";
            } else {
                window.location.href = 'feed.html';
            }
        }
    </script>
</body>
</html>
