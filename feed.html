<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home / PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="feed-body">
    <div class="feed-container">
        <aside class="sidebar">
            <div class="nav-links">
                <div class="logo-small">P.</div>
                <a href="#" class="active">Home</a>
                <a href="#">Explore</a>
                <a href="#">Notifications</a>
                <a href="#">Profile</a>
            </div>
            <button class="post-btn">Post</button>
        </aside>

        <main class="timeline">
            <header><h2>Home</h2></header>
            <div class="post-box">
                <input type="text" placeholder="What's happening in Amity?">
                <button class="submit-post">Post</button>
            </div>
            <div class="tweet">
                <div class="avatar"></div>
                <div class="content">
                    <strong>Student_Alpha</strong>
                    <p>Finally a place where we can talk freely without the coordinators watching. #PSDROA</p>
                </div>
            </div>
        </main>

        <aside class="widgets">
            <div class="search-bar"><input type="text" placeholder="Search Connect"></div>
            <div class="trending">
                <h3>What's Trending</h3>
                <p>#AmitySharjah</p>
                <p>#ExamWeek</p>
            </div>
        </aside>
    </div>
</body>
</html>
