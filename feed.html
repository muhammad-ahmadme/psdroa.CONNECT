<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | PSDROA.connect</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --twitter-blue: #1d9bf0;
            --border-gray: #2f3336;
            --text-dim: #71767b;
            --bg-black: #000;
            --bg-hover: rgba(255, 255, 255, 0.03);
        }

        body { background-color: var(--bg-black); color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }

        /* Layout */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 275px; border-right: 1px solid var(--border-gray); padding: 10px 20px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
        .feed-content { flex: 1; max-width: 600px; border-right: 1px solid var(--border-gray); min-height: 100vh; }
        .widgets { flex: 1; padding: 20px; max-width: 350px; }

        /* Threading & Post Styles */
        .post-card { padding: 15px; border-bottom: 1px solid var(--border-gray); display: flex; gap: 12px; transition: 0.2s; }
        .post-card:hover { background: rgba(255,255,255,0.02); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .post-author { font-weight: bold; margin-bottom: 4px; }
        
        .reply-thread-container { margin-left: 52px; border-left: 2px solid var(--border-gray); }
        .reply-card { padding: 10px 15px; display: flex; gap: 10px; font-size: 0.95rem; }
        
        .action-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; margin-top: 8px; transition: 0.2s; }
        .action-btn:hover { color: var(--twitter-blue); }

        .reply-input-box { display: none; padding: 10px 15px; gap: 10px; border-bottom: 1px solid var(--border-gray); background: rgba(29, 155, 240, 0.03); }

        /* Nav & Buttons */
        .nav-logo { font-size: 2rem; font-weight: 900; color: var(--twitter-blue); padding: 15px 0; cursor: pointer; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; transition: 0.2s; margin: 4px 0; }
        .nav-item:hover { background: var(--bg-hover); }
        .nav-item.active { font-weight: bold; color: var(--twitter-blue); }
        .main-btn { width: 100%; padding: 12px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: var(--twitter-blue); color: white; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .sidebar span, .widgets { display: none; }
            .reply-thread-container { margin-left: 20px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="nav-logo">P.</div>
            <nav>
                <div class="nav-item active" onclick="switchTab('home', this)"><i data-lucide="home"></i> <span>Home</span></div>
                <div class="nav-item" onclick="switchTab('messages', this)"><i data-lucide="mail"></i> <span>Messages</span></div>
                <div class="nav-item" onclick="switchTab('profile', this)"><i data-lucide="user"></i> <span>Profile</span></div>
            </nav>
            <div style="margin-top: auto; padding-bottom: 20px;">
                <button class="main-btn" style="background: transparent; border: 1px solid var(--border-gray); color: white;" onclick="handleLogout()">Logout</button>
            </div>
        </aside>

        <main class="feed-content">
            <section id="home-view" class="view-section">
                <div style="padding: 15px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--border-gray);">Home</div>
                <div style="padding: 15px; border-bottom: 1px solid var(--border-gray); display: flex; gap: 12px;">
                    <div class="user-avatar" id="composerAvatar">?</div>
                    <div style="flex:1">
                        <textarea id="postInput" style="width:100%; background:transparent; border:none; color:white; font-size: 1.2rem; resize:none; outline:none;" placeholder="What's happening?"></textarea>
                        <div style="display:flex; justify-content:flex-end; padding-top:10px;">
                            <button class="main-btn btn-blue" style="width:auto; padding: 8px 20px;" onclick="createPost()">Post</button>
                        </div>
                    </div>
                </div>
                <div id="postsContainer"></div>
            </section>
            
            <section id="messages-view" class="view-section" style="display:none; padding:20px;">Messages coming soon...</section>
            <section id="profile-view" class="view-section" style="display:none; padding:20px;">Profile details...</section>
        </main>

        <aside class="widgets">
            <div style="background: #16181c; border-radius: 16px; padding: 15px;">
                <h3 style="margin-top: 0;">Trending in Sharjah</h3>
                <p style="color: var(--twitter-blue); margin: 0;">#PSDROA.connect</p>
            </div>
        </aside>
    </div>

    <script>
        const _URL = 'https://riyqmlarvhipiwrhvuiw.supabase.co';
        const _KEY = 'sb_publishable_V1xXAdHLwMRjQuR5BHaG7A_6jat6I_E';
        const _db = supabase.createClient(_URL, _KEY);

        let currentUser = null;

        async function handleLogout() { await _db.auth.signOut(); window.location.href = 'login.html'; }

        function switchTab(tab, el) {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-view`).style.display = 'block';
            if(el) el.classList.add('active');
            if(tab === 'home') loadPosts();
        }

        async function loadPosts() {
            const { data: allPosts, error } = await _db.from('posts').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);
            renderPosts(allPosts || []);
        }

        function renderPosts(allPosts) {
            const container = document.getElementById('postsContainer');
            const mainPosts = allPosts.filter(p => !p.parent_id);
            const replies = allPosts.filter(p => p.parent_id);

            container.innerHTML = mainPosts.map(p => {
                const postReplies = replies.filter(r => r.parent_id === p.id);
                return `
                <div class="post-group">
                    <div class="post-card">
                        <div class="user-avatar">${p.username ? p.username[0].toUpperCase() : '?'}</div>
                        <div style="flex:1">
                            <div class="post-author">@${p.username}</div>
                            <p class="post-text">${p.content}</p>
                            <button class="action-btn" onclick="toggleReplyInput('${p.id}')">
                                <i data-lucide="message-circle" style="width:16px"></i> Reply
                            </button>
                        </div>
                    </div>
                    <div id="reply-box-${p.id}" class="reply-input-box">
                        <input type="text" id="input-${p.id}" placeholder="Post your reply" 
                               style="flex:1; background:#16181c; border:none; color:white; padding:10px; border-radius:20px; outline:none;">
                        <button class="main-btn btn-blue" style="width:auto; padding:5px 15px;" onclick="submitReply('${p.id}')">Reply</button>
                    </div>
                    <div class="reply-thread-container">
                        ${postReplies.map(r => `
                            <div class="reply-card">
                                <div class="user-avatar" style="width:30px; height:30px; font-size:0.8rem;">${r.username ? r.username[0].toUpperCase() : '?'}</div>
                                <div style="flex:1">
                                    <div class="post-author" style="font-size:0.9rem;">@${r.username}</div>
                                    <p class="post-text" style="font-size:0.9rem; color:#eff3f4;">${r.content}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function toggleReplyInput(postId) {
            const box = document.getElementById(`reply-box-${postId}`);
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
            if(box.style.display === 'flex') document.getElementById(`input-${postId}`).focus();
        }

        async function submitReply(parentId) {
            const input = document.getElementById(`input-${parentId}`);
            const content = input.value.trim();
            if(!content) return;
            const { data: prof } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            await _db.from('posts').insert([{ user_id: currentUser.id, content, username: prof.username, parent_id: parentId }]);
            input.value = '';
            toggleReplyInput(parentId);
            loadPosts();
        }

        async function createPost() {
            const input = document.getElementById('postInput');
            const content = input.value.trim();
            if(!content) return;
            const { data: prof } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            await _db.from('posts').insert([{ user_id: currentUser.id, content, username: prof.username }]);
            input.value = '';
            loadPosts();
        }

        function setupRealtime() {
            _db.channel('public-posts').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
                loadPosts();
            }).subscribe();
        }

        async function init() {
            lucide.createIcons();
            const { data: { user } } = await _db.auth.getUser();
            if (!user) return window.location.href = 'login.html';
            currentUser = user;
            
            const { data: profile } = await _db.from('profiles').select('username').eq('id', user.id).single();
            if(profile) document.getElementById('composerAvatar').innerText = profile.username[0].toUpperCase();
            
            loadPosts();
            setupRealtime();
        }

        init();
    </script>
</body>
</html>
