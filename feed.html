<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home / PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="feed-body">
    <div class="feed-layout">
        <aside class="sidebar-left">
            <div class="nav-brand">P.</div>
            <nav>
                <a href="#" class="active">Home</a>
                <a href="#">Explore</a>
                <a href="#" onclick="handleLogout()">Logout</a>
            </nav>
        </aside>

        <main class="timeline">
            <header class="feed-header"><h2>Home</h2></header>
            <div class="post-box">
                <textarea id="postInput" placeholder="What's happening?"></textarea>
                <button onclick="createPost()">Post</button>
            </div>
            <div id="postsContainer"></div>
        </main>

        <aside class="sidebar-right">
            <div class="trending">
                <h3>What's Trending</h3>
                <p>#AmitySharjah</p>
                <p>#ExamSeason</p>
            </div>
        </aside>
    </div>

    <script>
        const supabase = supabase.createClient('https://riyqmlarvhipiwrhvuiw.supabase.co', 'sb_publishable_V1xXAdHLwMRjQuR5BHaG7A_6jat6I_E');

        async function loadPosts() {
            const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('postsContainer');
            container.innerHTML = data.map(p => `
                <div class="post">
                    <strong>@Student</strong>
                    <p>${p.content}</p>
                </div>
            `).join('');
        }

        async function createPost() {
            const content = document.getElementById('postInput').value;
            const { data: { user } } = await supabase.auth.getUser();
            await supabase.from('posts').insert([{ content, user_id: user.id }]);
            document.getElementById('postInput').value = '';
            loadPosts();
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        loadPosts();
    </script>
</body>
</html>
