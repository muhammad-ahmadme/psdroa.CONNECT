<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | PSDROA.connect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* UI Adjustments */
        .dm-layout { display: flex; height: 60vh; border: 1px solid var(--border-gray); border-radius: 12px; overflow: hidden; margin-top: 10px; }
        .dm-sidebar { width: 30%; border-right: 1px solid var(--border-gray); background: rgba(255,255,255,0.02); overflow-y: auto; }
        .dm-main { flex: 1; display: flex; flex-direction: column; background: #000; }
        .chat-bubble { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; margin-bottom: 4px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--twitter-blue); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #2f3336; color: white; border-bottom-left-radius: 4px; }
        .convo-item { padding: 12px; border-bottom: 1px solid var(--border-gray); cursor: pointer; transition: 0.2s; }
        .convo-item:hover { background: rgba(255,255,255,0.05); }
        .convo-item.active { background: rgba(29, 155, 240, 0.1); border-left: 3px solid var(--twitter-blue); }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">P.<span>connect</span></div>
            <nav class="side-nav">
                <div class="nav-item active" onclick="switchTab('home', this)"><i data-lucide="home"></i> <span>Home</span></div>
                <div class="nav-item" onclick="switchTab('messages', this)"><i data-lucide="mail"></i> <span>Messages</span></div>
                <div class="nav-item" onclick="switchTab('profile', this)"><i data-lucide="user"></i> <span>Profile</span></div>
            </nav>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </aside>

        <main class="feed-content">
            <section id="home-view" class="view-section">
                <div class="feed-header"><h2>Home</h2></div>
                <div class="composer card">
                    <textarea id="postInput" placeholder="What's happening?"></textarea>
                    <div style="text-align: right; padding-top: 10px;"><button class="post-btn" onclick="createPost()">Post</button></div>
                </div>
                <div id="postsContainer"></div>
                <div id="archiveSection" style="text-align: center; padding: 20px;">
                    <button id="loadArchiveBtn" onclick="loadFromArchive()" style="display:none; background:transparent; border:1px solid var(--border-gray); color:var(--text-dim); padding:10px 20px; border-radius:20px; cursor:pointer;">
                        Load Older Posts from Archive
                    </button>
                </div>
            </section>

            <section id="messages-view" class="view-section" style="display:none">
                <div class="feed-header"><h2>Messages</h2></div>
                <div class="dm-layout">
                    <div class="dm-sidebar" id="activeConvos"></div>
                    <div class="dm-main">
                        <div id="chatWindow" style="flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:5px;">
                            <p style="color:var(--text-dim); text-align:center; margin-top:150px;">Select a user to chat</p>
                        </div>
                        <div style="padding:15px; border-top:1px solid #333; display:flex; gap:10px;">
                            <input type="text" id="dmInput" placeholder="Start typing..." style="flex:1; background:transparent; border:none; color:white; outline:none;">
                            <button class="post-btn" onclick="sendDM()" style="padding: 5px 15px;">Send</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="profile-view" class="view-section" style="display:none">
                <div class="feed-header"><h2>Profile</h2></div>
                <div class="card profile-card" style="text-align: center; padding: 30px;">
                    <div id="profileInitial" style="width:80px; height:80px; background:var(--twitter-blue); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:900;">?</div>
                    <h2 id="profileUsername">@username</h2>
                    <p id="profileEmail" style="color:var(--text-dim); margin-bottom:20px;"></p>
                    <div style="display:flex; justify-content:center; gap:20px; border-top:1px solid #333; padding-top:20px;">
                        <div><div id="postCount" style="font-weight:bold;">0</div><div style="font-size:0.8rem; color:var(--text-dim);">Posts</div></div>
                        <div><div id="verifyStatus" style="font-weight:bold;">-</div><div style="font-size:0.8rem; color:var(--text-dim);">Status</div></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const _URL = 'https://riyqmlarvhipiwrhvuiw.supabase.co';
        const _KEY = 'sb_publishable_V1xXAdHLwMRjQuR5BHaG7A_6jat6I_E';
        const _db = supabase.createClient(_URL, _KEY);

        let currentUser = null;
        let activeChatId = null;

        async function init() {
            const { data: { user } } = await _db.auth.getUser();
            if (!user) return window.location.href = 'login.html';
            currentUser = user;
            loadPosts();
            setupRealtime();
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`${tab}-view`).style.display = 'block';
            el.classList.add('active');
            
            if(tab === 'profile') loadProfileData();
            if(tab === 'messages') loadConversations();
        }

        // --- PROFILE LOGIC ---
        async function loadProfileData() {
            const { data: profile } = await _db.from('profiles').select('*').eq('id', currentUser.id).single();
            const { count } = await _db.from('posts').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
            
            if(profile) {
                document.getElementById('profileUsername').innerText = `@${profile.username}`;
                document.getElementById('profileEmail').innerText = currentUser.email;
                document.getElementById('profileInitial').innerText = profile.username[0].toUpperCase();
                document.getElementById('postCount').innerText = count || 0;
                
                const status = document.getElementById('verifyStatus');
                status.innerText = profile.is_verified ? "Verified" : "Pending";
                status.style.color = profile.is_verified ? "#1d9bf0" : "#ffd700";
            }
        }

        // --- POST LOGIC ---
        async function loadPosts() {
            const { data: posts } = await _db.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('postsContainer');
            const archiveBtn = document.getElementById('loadArchiveBtn');

            container.innerHTML = posts.map(p => `
                <div class="post-card card">
                    <div class="post-user">@${p.username}</div>
                    <p class="post-text">${p.content}</p>
                </div>`).join('');

            // Check if archive files exist to show the button
            const { data: files } = await _db.storage.from('archives').list();
            if (files && files.length > 0) {
                archiveBtn.style.display = 'inline-block';
            }
        }

        async function loadFromArchive() {
            const btn = document.getElementById('loadArchiveBtn');
            const container = document.getElementById('postsContainer');
            btn.innerText = "Loading Archives...";
            btn.disabled = true;

            try {
                const { data: files } = await _db.storage.from('archives').list();
                if (!files || files.length === 0) return;

                const latestFile = files[files.length - 1].name;
                const { data: blob } = await _db.storage.from('archives').download(latestFile);
                const archivedPosts = JSON.parse(await blob.text());

                const archiveHTML = archivedPosts.map(p => `
                    <div class="post-card card" style="border-left: 3px solid #333; opacity: 0.7;">
                        <div class="post-user">@${p.username} <span style="font-size:0.7rem; color:gray;">(Archived)</span></div>
                        <p class="post-text">${p.content}</p>
                    </div>`).join('');

                container.innerHTML += `<div style="text-align:center; color:gray; font-size:0.8rem; margin:30px 0;">--- History Loaded ---</div>` + archiveHTML;
                btn.style.display = 'none';
            } catch (e) {
                btn.innerText = "Error loading archive";
            }
        }

        async function createPost() {
            const content = document.getElementById('postInput').value.trim();
            if(!content) return;
            const { data: profile } = await _db.from('profiles').select('username').eq('id', currentUser.id).single();
            await _db.from('posts').insert([{ user_id: currentUser.id, content, username: profile.username }]);
            document.getElementById('postInput').value = '';
            loadPosts();
        }

        // --- DM LOGIC ---
        async function loadConversations() {
            const { data: profiles } = await _db.from('profiles').select('*').neq('id', currentUser.id);
            document.getElementById('activeConvos').innerHTML = profiles.map(p => `
                <div class="convo-item" onclick="openChat('${p.id}', this)">@${p.username}</div>
            `).join('');
        }

        async function openChat(userId, el) {
            activeChatId = userId;
            document.querySelectorAll('.convo-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            loadMessages();
        }

        async function loadMessages() {
            if (!activeChatId) return;
            const { data: msgs } = await _db.from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${activeChatId}),and(sender_id.eq.${activeChatId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            const win = document.getElementById('chatWindow');
            win.innerHTML = msgs.map(m => `<div class="chat-bubble ${m.sender_id === currentUser.id ? 'sent' : 'received'}">${m.content}</div>`).join('');
            win.scrollTop = win.scrollHeight;
        }

        async function sendDM() {
            const content = document.getElementById('dmInput').value.trim();
            if (!content || !activeChatId) return;
            await _db.from('messages').insert([{ sender_id: currentUser.id, receiver_id: activeChatId, content }]);
            document.getElementById('dmInput').value = '';
            loadMessages();
        }

        function setupRealtime() {
            _db.channel('room1').on('postgres_changes', { event: '*', schema: 'public' }, () => {
                loadPosts();
                if(activeChatId) loadMessages();
            }).subscribe();
        }

        async function handleLogout() { await _db.auth.signOut(); window.location.href = 'login.html'; }
        init();
    </script>
</body>
</html>
