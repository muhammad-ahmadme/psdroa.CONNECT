<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>PSDROA<span>.connect</span></h2>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </aside>

        <main class="feed-content">
            <div class="composer card">
                <textarea id="postInput" placeholder="What's on your mind?"></textarea>
                <div style="text-align: right; border-top: 1px solid rgba(255,255,255,0.1); pt: 10px;">
                    <button class="post-btn" onclick="createPost()">Post</button>
                </div>
            </div>
            <div id="postsContainer"></div>
        </main>

        <aside class="widgets">
            <div class="card"><h3>Guidelines</h3><p>Keep it APS friendly.</p></div>
        </aside>
    </div>

    <script>
        const _URL = 'https://riyqmlarvhipiwrhvuiw.supabase.co';
        const _KEY = 'sb_publishable_V1xXAdHLwMRjQuR5BHaG7A_6jat6I_E';
        const _db = supabase.createClient(_URL, _KEY);

        // 1. Post Functionality
        async function createPost() {
            const content = document.getElementById('postInput').value;
            const { data: { user } } = await _db.auth.getUser();

            if (!content) return;

            const { error } = await _db.from('posts').insert([
                { user_id: user.id, content: content, username: user.email.split('@')[0] }
            ]);

            if (!error) {
                document.getElementById('postInput').value = '';
                loadPosts();
            }
        }

        // 2. Load Posts
        async function loadPosts() {
            const { data: posts } = await _db.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('postsContainer');
            
            container.innerHTML = posts.map(p => `
                <div class="card">
                    <div class="post-user">@${p.username}</div>
                    <p>${p.content}</p>
                </div>
            `).join('');
        }

        loadPosts();
        // 1. Tab Switching Logic
function switchTab(tabName) {
    // Hide all sections
    document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
    // Remove active class from nav
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    // Show selected
    document.getElementById(`${tabName}-view`).style.display = 'block';
    event.currentTarget.classList.add('active');

    if(tabName === 'profile') loadProfileData();
}

// 2. Load Profile Data from Supabase
async function loadProfileData() {
    const { data: { user } } = await _db.auth.getUser();
    if (user) {
        document.getElementById('profileUsername').innerText = `@${user.email.split('@')[0]}`;
        document.getElementById('profileEmail').innerText = user.email;
    }
}

}
    </script>
</body>
</html>
